name: Build AstroLog APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Añadir Safe Args plugin (root build.gradle)
        run: |
          sed -i "s|classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\"|classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\"\n        classpath \"androidx.navigation:navigation-safe-args-gradle-plugin:2.7.6\"|" build.gradle

      - name: Añadir Safe Args plugin (app build.gradle)
        run: |
          sed -i "s|id 'kotlin-kapt'|id 'kotlin-kapt'\n    id 'androidx.navigation.safeargs.kotlin'|" app/build.gradle

      - name: Eliminar stubs manuales de Safe Args
        run: |
          rm -f app/src/main/java/com/astrolog/app/ui/sessions/SessionsFragmentDirections.kt
          rm -f app/src/main/java/com/astrolog/app/ui/newsession/NewSessionFragmentArgs.kt

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: AstroLog-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
